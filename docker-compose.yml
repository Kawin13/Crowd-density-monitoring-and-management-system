version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: crowd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1310
      MYSQL_DATABASE: crowd_monitoring
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1310"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowd-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/crowd_monitoring?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1310
      APP_AI_SERVICE_URL: http://ai-service:8000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: crowd-ai
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8000:8000"
    volumes:
      - yolo_models:/root/.config/Ultralytics

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crowd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"

volumes:
  mysql_data:
  yolo_models:
