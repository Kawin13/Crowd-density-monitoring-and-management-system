# Application
spring.application.name=crowd-monitoring-backend
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# Disable Spring Boot SQL file initializer — DataInitializer.java handles seeding
spring.sql.init.mode=never

# JWT
app.jwt.secret=crowdMonitoringSecretKey2024SuperLongSecretKeyForHS512Algorithm
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://crowd-monitor.vercel.app

# AI Service
app.ai.service.url=http://localhost:8000

# Mail — disable connection test so startup succeeds without real SMTP credentials
# Replace host/username/password with real values when email is needed
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.test-connection=false

# App Email
app.email.from=noreply@crowdmonitor.com
app.frontend.url=http://localhost:5173

# File Storage
app.file.upload-dir=./uploads
app.file.report-dir=./reports

# Jackson — serialize LocalDateTime correctly
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.crowdmonitor=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
